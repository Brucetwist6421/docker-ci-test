name: Docker CI and Security Scan

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    - name: 체크아웃 소스코드
      uses: actions/checkout@v3

    - name: 도커 이미지 빌드
      run: docker build -t my-app:${{ github.sha }} .

    - name: Trivy 보안 스캔 실행
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'my-app:${{ github.sha }}'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL'
